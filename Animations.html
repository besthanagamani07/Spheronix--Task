<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animations</title>

<style>
*{
    margin:0;
    padding:0;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:190px;
    width: 120px;
    background:#111;
    gap:20px;
    flex-wrap:wrap;
}

.item{
    width:80px;
    height:80px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:12px;
}

.slide{
    background:lightblue;
    animation:slide 2s infinite;
}

@keyframes slide{
    0%{ transform:translateX(0); }
    50%{ transform:translateX(150px); }
    100%{ transform:translateX(0); }
}

.rotate{
    background:#e32275;
    animation:rotate 2s infinite;
}

@keyframes rotate{
    0%{ transform:rotate(0); }
    50%{ transform:rotate(180deg); }
    100%{ transform:rotate(360deg); }
}

.fade{
    background:#09c825;
    animation:fade 2s infinite;
}

@keyframes fade{
    0%{ opacity:0; }
    50%{ opacity:1; }
    100%{ opacity:0; }
}

.flip{
    background:#fb2323;
    animation:flip 2s infinite;
}

@keyframes flip{
    0%{ transform:rotateY(0); }
    50%{ transform:rotateY(180deg); }
    100%{ transform:rotateY(360deg); }
}

.ease{
    background:#321dcf;
    animation:easeMove 2s infinite ease-in-out;
}

@keyframes easeMove{
    0%{ transform:translateY(0); }
    50%{ transform:translateY(-120px); }
    100%{ transform:translateY(0); }
}
</style>
</head>

<body>

<div class="item slide">slide</div>
<div class="item rotate">rotate</div>
<div class="item fade">fade</div>
<div class="item flip">flip</div>
<div class="item ease">ease</div>

</body>
</html>
